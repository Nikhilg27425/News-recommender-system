services:
  # ── Flask API backend ──────────────────────────────────────────────────────
  - type: web
    name: newssphere-api
    env: python
    region: oregon
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GNEWS_API_KEY
        sync: false          # Set in Render dashboard
      - key: GOOGLE_CLIENT_ID
        sync: false          # Set in Render dashboard
      - key: GOOGLE_CLIENT_SECRET
        sync: false          # Set in Render dashboard
      - key: GITHUB_CLIENT_ID
        sync: false          # Set in Render dashboard
      - key: GITHUB_CLIENT_SECRET
        sync: false          # Set in Render dashboard
      - key: FRONTEND_URL
        sync: false          # Set to your static site URL, e.g. https://newssphere.onrender.com
      - key: GOOGLE_REDIRECT_URI
        sync: false          # https://newssphere-api.onrender.com/api/auth/google/callback
      - key: GITHUB_REDIRECT_URI
        sync: false          # https://newssphere-api.onrender.com/api/auth/github/callback

  # ── React frontend (static site) ─────────────────────────────────────────
  - type: web
    name: newssphere
    env: static
    region: oregon
    plan: free
    rootDir: client
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html   # SPA fallback for React Router
    envVars:
      - key: VITE_API_URL
        sync: false                # Set to https://newssphere-api.onrender.com
